name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run compile

      - name: Run tests
        run: xvfb-run -a npm test

      - run: sudo apt-get install -y scrot

      - name: Capture screenshots
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" npm run screenshot

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - run: npx @vscode/vsce package --no-dependencies

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots-v${{ steps.version.outputs.version }}-${{ github.sha }}
          path: screenshots/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-v${{ steps.version.outputs.version }}-${{ github.sha }}
          path: "*.vsix"
          retention-days: 7
