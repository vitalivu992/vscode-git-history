name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run tests
        run: |
          npm run compile
          xvfb-run -a npm test

      - name: Package extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-git-history-v${{ steps.version.outputs.version }}
          path: "*.vsix"

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" *.vsix

      - name: Bump next version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ github.event_name }}" = "release" ]; then
            npm version "patch" --no-git-tag-version
          else
            # Bump based on workflow_dispatch input
            npm version "${{ inputs.bump }}" --no-git-tag-version
          fi

          VERSION=$(node -p "require('./package.json').version")
          echo "the next version is $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          git add package.json
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push
